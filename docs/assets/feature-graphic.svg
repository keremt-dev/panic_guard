<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C1F27"/>
      <stop offset="1" stop-color="#0E0F13"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Emblem: ring + shield + check -->
  <g transform="translate(250 250)">
    <circle cx="0" cy="0" r="150" fill="none" stroke="#F2424B" stroke-opacity="0.14" stroke-width="3"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#F2424B" stroke-opacity="0.6" stroke-width="5"/>
    <!-- shield -->
    <path d="M0,-95 L80,-60 L80,30 C80,75 47,102 0,117 C-47,102 -80,75 -80,30 L-80,-60 Z"
          fill="#F2424B" fill-opacity="0.18" stroke="#F2424B" stroke-width="6" stroke-linejoin="round"/>
    <!-- check -->
    <path d="M-34,8 L-10,32 L40,-24" fill="none" stroke="#F2F3F5" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="430" y="205" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="62"
        font-weight="700" letter-spacing="3" fill="#F2F3F5">PANIC SHIELD</text>

  <text x="432" y="262" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="30"
        font-weight="500" fill="#C7CAD1">Volume up &#215;3 &#8212; lock, alert, protect.</text>

  <text x="432" y="330" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="24"
        font-weight="600" letter-spacing="1" fill="#34D399">No internet&#160;&#160;&#183;&#160;&#160;No tracking&#160;&#160;&#183;&#160;&#160;No ads</text>
</svg>
